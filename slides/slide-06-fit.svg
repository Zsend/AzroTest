<text x="960" y="148.0" fill="#71DDFF" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="3.2">WHO THIS IS FOR</text>
<text x="960" y="246.0" fill="#F5F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="84" font-weight="800" text-anchor="middle" letter-spacing="0">Built for disciplined</text>
<text x="960" y="321.6" fill="#F5F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="84" font-weight="800" text-anchor="middle" letter-spacing="0">Bitcoin allocators.</text>
<text x="960" y="394.0" fill="rgba(244,247,255,.84)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="24" font-weight="500" text-anchor="middle" letter-spacing="0">A calm operating process for long-horizon execution — not a chart toy.</text>
<rect x="60" y="476" width="576" height="320" rx="28" fill="url(#cardFill)" stroke="rgba(184,197,237,.18)" stroke-width="2" filter="url(#cardShadow)" />
<rect x="90" y="500" width="72" height="6" rx="3" fill="#71DDFF"/>
<text x="90" y="548.0" fill="rgba(244,247,255,.68)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="13" font-weight="800" text-anchor="start" letter-spacing="4">FOR</text>
<text x="90" y="614.0" fill="#F5F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="24" font-weight="800" text-anchor="start" letter-spacing="0">Long-horizon accumulators</text>
<text x="90" y="662.8" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="17" font-weight="500" text-anchor="start" letter-spacing="0">Structured BTC sizing instead of emotional allocation. Readable,</text>
<text x="90" y="686.26" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="17" font-weight="500" text-anchor="start" letter-spacing="0">dashboard-first decisions instead of chart clutter. Optional trims only</text>
<text x="90" y="709.7199999999999" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="17" font-weight="500" text-anchor="start" letter-spacing="0">when the policy supports them.</text>
<rect x="672" y="476" width="576" height="320" rx="28" fill="url(#cardFill)" stroke="rgba(184,197,237,.18)" stroke-width="2" filter="url(#cardShadow)" />
<rect x="702" y="500" width="72" height="6" rx="3" fill="#5F8FFF"/>
<text x="702" y="548.0" fill="rgba(244,247,255,.68)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="13" font-weight="800" text-anchor="start" letter-spacing="4">FOR</text>
<text x="702" y="614.0" fill="#F5F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="24" font-weight="800" text-anchor="start" letter-spacing="0">Hybrid operators</text>
<text x="702" y="662.8" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="17" font-weight="500" text-anchor="start" letter-spacing="0">Disciplined accumulation plus optional profit-taking without</text>
<text x="702" y="686.26" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="17" font-weight="500" text-anchor="start" letter-spacing="0">abandoning a plan the moment volatility spikes.</text>
<rect x="1284" y="476" width="576" height="320" rx="28" fill="url(#cardFill)" stroke="rgba(184,197,237,.18)" stroke-width="2" filter="url(#cardShadow)" />
<rect x="1314" y="500" width="72" height="6" rx="3" fill="#8E6CFF"/>
<text x="1314" y="548.0" fill="rgba(244,247,255,.68)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="13" font-weight="800" text-anchor="start" letter-spacing="4">FOR</text>
<text x="1314" y="614.0" fill="#F5F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="24" font-weight="800" text-anchor="start" letter-spacing="0">Governance-minded allocators</text>
<text x="1314" y="662.8" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="17" font-weight="500" text-anchor="start" letter-spacing="0">A repeatable, reviewable workflow with built-in benchmark</text>
