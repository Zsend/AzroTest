<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img">

    <defs>
      <linearGradient id="bgOverlay" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#08112A" stop-opacity="0.55"/>
        <stop offset="52%" stop-color="#060B18" stop-opacity="0.36"/>
        <stop offset="100%" stop-color="#140B25" stop-opacity="0.48"/>
      </linearGradient>
      <radialGradient id="blueGlow" cx="0.22" cy="0.18" r="0.55">
