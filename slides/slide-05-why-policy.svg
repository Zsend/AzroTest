        <stop offset="100%" stop-color="rgba(12,17,34,.70)"/>
      </linearGradient>
      <linearGradient id="buyChip" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#5CC15C"/>
        <stop offset="100%" stop-color="#51B652"/>
      </linearGradient>
      <linearGradient id="holdChip" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2A3C6B"/>
        <stop offset="100%" stop-color="#203055"/>
      </linearGradient>
      <linearGradient id="trimChip" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#C8922E"/>
        <stop offset="100%" stop-color="#B98324"/>
      </linearGradient>
    </defs>
    

