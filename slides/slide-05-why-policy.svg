    <g id="brand-bar">
      <rect x="58" y="44" width="72" height="72" rx="20" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.12)" />
      <image href="assets/logo-mark.png" x="76" y="62" width="36" height="36" />
      <text x="146" y="78" fill="#F4F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="28" font-weight="800">AZRO Systems</text>
      <text x="146" y="107" fill="rgba(244,247,255,.65)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="15" font-weight="700" letter-spacing="6">BTC OPERATING SYSTEM</text>
      <rect x="1408" y="42" width="452" height="64" rx="32" fill="rgba(255,255,255,.05)" stroke="rgba(195,205,238,.20)" />
      <text x="1634" y="83" fill="#F1F5FF" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="16" font-weight="700" letter-spacing="3" text-anchor="middle">MAP THE CYCLE. CUT THE NOISE.</text>
    </g>
    
<text x="960" y="146.0" fill="#71DDFF" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="3">WHY THIS OUTCLASSES THE COMMON APPROACHES</text>
<text x="960" y="244.0" fill="#F5F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="86" font-weight="800" text-anchor="middle" letter-spacing="0">Replace improvisation</text>
<text x="960" y="321.4" fill="#F5F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="86" font-weight="800" text-anchor="middle" letter-spacing="0">with policy.</text>
<text x="960" y="392.0" fill="rgba(244,247,255,.84)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="24" font-weight="500" text-anchor="middle" letter-spacing="0">The hard part is not knowing Bitcoin is volatile. The hard part is staying consistent when volatility starts</text>
<text x="960" y="422.0" fill="rgba(244,247,255,.84)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="24" font-weight="500" text-anchor="middle" letter-spacing="0">negotiating with your emotions.</text>
<rect x="60" y="474" width="576" height="222" rx="28" fill="url(#cardFill)" stroke="rgba(184,197,237,.18)" stroke-width="2" filter="url(#cardShadow)" />
<rect x="90" y="498" width="72" height="6" rx="3" fill="#71DDFF"/>
<text x="90" y="546.0" fill="rgba(244,247,255,.68)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="13" font-weight="800" text-anchor="start" letter-spacing="4">COMMON TRAP</text>
<text x="90" y="612.0" fill="#F5F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="26" font-weight="800" text-anchor="start" letter-spacing="0">Waiting for the perfect dip</text>
<text x="90" y="662.7" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="18" font-weight="500" text-anchor="start" letter-spacing="0">Missed allocation compounds. Hesitation feels safe until the</text>
<text x="90" y="687.5400000000001" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="18" font-weight="500" text-anchor="start" letter-spacing="0">move happens without you.</text>
<rect x="672" y="474" width="576" height="222" rx="28" fill="url(#cardFill)" stroke="rgba(184,197,237,.18)" stroke-width="2" filter="url(#cardShadow)" />
<rect x="702" y="498" width="72" height="6" rx="3" fill="#5F8FFF"/>
<text x="702" y="546.0" fill="rgba(244,247,255,.68)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="13" font-weight="800" text-anchor="start" letter-spacing="4">COMMON TRAP</text>
<text x="702" y="612.0" fill="#F5F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="26" font-weight="800" text-anchor="start" letter-spacing="0">Plain auto-buy</text>
<text x="702" y="662.7" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="18" font-weight="500" text-anchor="start" letter-spacing="0">Participation is better than indecision, but sizing stays blind to</text>
<text x="702" y="687.5400000000001" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="18" font-weight="500" text-anchor="start" letter-spacing="0">cycle context.</text>
<rect x="1284" y="474" width="576" height="222" rx="28" fill="url(#cardFill)" stroke="rgba(184,197,237,.18)" stroke-width="2" filter="url(#cardShadow)" />
<rect x="1314" y="498" width="72" height="6" rx="3" fill="#8E6CFF"/>
<text x="1314" y="546.0" fill="rgba(244,247,255,.68)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="13" font-weight="800" text-anchor="start" letter-spacing="4">COMMON TRAP</text>
<text x="1314" y="612.0" fill="#F5F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="26" font-weight="800" text-anchor="start" letter-spacing="0">Emotional trimming</text>
<text x="1314" y="662.7" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="18" font-weight="500" text-anchor="start" letter-spacing="0">Selling is easy. Re-entering with discipline is where most “smart”</text>
<text x="1314" y="687.5400000000001" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="18" font-weight="500" text-anchor="start" letter-spacing="0">plans break down.</text>
<rect x="60" y="732" width="1800" height="286" rx="30" fill="rgba(255,255,255,.05)" stroke="rgba(184,197,237,.18)" stroke-width="2" filter="url(#cardShadow)" />
<rect x="90" y="756" width="72" height="6" rx="3" fill="#D7DBE6"/>
<text x="90" y="806.0" fill="rgba(244,247,255,.68)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="13" font-weight="800" text-anchor="start" letter-spacing="4">THE NO-BRAINER LOGIC</text>
<text x="90" y="878.0" fill="#F5F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="54" font-weight="800" text-anchor="start" letter-spacing="0">AZRO gives you a calmer weekly</text>
<text x="90" y="929.3" fill="#F5F7FF" font-family="'Exo 2','Noto Sans Display','Inter Display','Inter',sans-serif" font-size="54" font-weight="800" text-anchor="start" letter-spacing="0">operating system.</text>
<text x="90" y="986.0" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="22" font-weight="500" text-anchor="start" letter-spacing="0">Instead of guessing entries, forcing trims, or improvising size, you get context, a policy,</text>
<text x="90" y="1014.16" fill="rgba(244,247,255,.86)" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="22" font-weight="500" text-anchor="start" letter-spacing="0">an amount, and visible proof versus auto-buy — all in one workflow.</text>
<rect x="1220" y="820" width="280" height="72" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(181,195,237,.18)" stroke-width="2"/>
<text x="1360" y="866" fill="#F5F7FF" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="24" font-weight="700" text-anchor="middle">Clear action</text>
<rect x="1500" y="820" width="280" height="72" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(181,195,237,.18)" stroke-width="2"/>
<text x="1640" y="866" fill="#F5F7FF" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="24" font-weight="700" text-anchor="middle">Suggested amount</text>
<rect x="1220" y="912" width="280" height="72" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(181,195,237,.18)" stroke-width="2"/>
<text x="1360" y="958" fill="#F5F7FF" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="24" font-weight="700" text-anchor="middle">Four policy modes</text>
<rect x="1500" y="912" width="280" height="72" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(181,195,237,.18)" stroke-width="2"/>
<text x="1640" y="958" fill="#F5F7FF" font-family="'Inter Display','Inter','Noto Sans Display',sans-serif" font-size="24" font-weight="700" text-anchor="middle">Audit vs baseline</text>
</g>
