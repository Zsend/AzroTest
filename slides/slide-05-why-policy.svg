        <stop offset="58%" stop-color="#3E7DFF" stop-opacity="0.10"/>
        <stop offset="100%" stop-color="#3E7DFF" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="purpleGlow" cx="0.84" cy="0.12" r="0.48">
