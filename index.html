<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />

  <title>Virtue Climbing — Coming Soon</title>
  <meta name="description" content="Virtue Climbing is coming soon. Subscribe for launch updates, early access, and rewards." />
  <link rel="canonical" href="https://www.virtueclimbing.com/" />

  <!-- Favicons / App icons -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#05060a" />

  <!-- Social preview -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Virtue Climbing" />
  <meta property="og:title" content="Virtue Climbing — Coming Soon" />
  <meta property="og:description" content="Subscribe for launch updates, early access, and rewards." />
  <meta property="og:url" content="https://www.virtueclimbing.com/" />
  <meta property="og:image" content="https://www.virtueclimbing.com/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Virtue Climbing — Coming Soon" />
  <meta name="twitter:description" content="Subscribe for launch updates, early access, and rewards." />
  <meta name="twitter:image" content="https://www.virtueclimbing.com/og.png" />

  <!-- Performance hints -->
  <link rel="preload" as="image" href="img/logo.webp" type="image/webp" />
  <link rel="preload" as="image" href="img/logo.png" type="image/png" />

  <link rel="stylesheet" href="style.css" />

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Virtue Climbing",
    "url": "https://www.virtueclimbing.com/",
    "logo": "https://www.virtueclimbing.com/img/logo.png"
  }
  </script>
</head>
<body>
  <div class="bg" aria-hidden="true"><canvas id="bg-canvas"></canvas></div>

  <main class="wrap">
    <section class="card" aria-label="Virtue Climbing coming soon">
      <picture class="brand">
        <source srcset="img/logo.webp" type="image/webp" />
        <img
          src="img/logo.png"
          width="340"
          height="158"
          alt="Virtue Climbing"
          decoding="async"
          fetchpriority="high"
        />
      </picture>

      <h1>Stay tuned</h1>
      <p class="sub">Subscribe for launch updates, early access, and member-only rewards.</p>

      <div class="features" aria-hidden="true">
        <span class="chip">Early drops</span>
        <span class="chip">Launch rewards</span>
        <span class="chip">Member updates</span>
      </div>

      <div class="subscribe">
        <!--
          ✅ Free + easiest email collection (no backend): FormSubmit

          1) Replace YOUR_RECEIVING_EMAIL@example.com below with the email you want signups sent to.
          2) Publish the site.
          3) Submit the form once yourself — FormSubmit will email you a confirmation link.

          Optional (recommended): after confirming, switch to FormSubmit's “invisible” address/token
          so your real email isn’t visible in the page source.

          Docs: https://formsubmit.co/
        -->
        <form
          class="subscribe-form"
          id="subscribe-form"
          action="https://formsubmit.co/YOUR_RECEIVING_EMAIL@example.com"
          method="POST"
          autocomplete="on"
          novalidate
        >
          <!-- Send user back to your own thank-you page -->
          <input type="hidden" name="_next" value="https://www.virtueclimbing.com/thanks.html" />
          <input type="hidden" name="_subject" value="Virtue Climbing — New subscriber" />
          <input type="hidden" name="_template" value="table" />
          <!-- Set to false for a frictionless signup (honeypot still blocks most bots). Remove if you prefer CAPTCHA. -->
          <input type="hidden" name="_captcha" value="false" />

          <!-- Spam honeypot -->
          <input class="honeypot" type="text" name="_honey" tabindex="-1" autocomplete="off" aria-hidden="true" />

          <label class="sr-only" for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            autocapitalize="none"
            spellcheck="false"
            placeholder="Email address"
            aria-describedby="signup-note"
            required
          />

          <button type="submit" id="join-btn">Join</button>
        </form>

        <p id="form-error" class="form-error" role="alert" aria-live="polite" hidden></p>

        <p class="fineprint" id="signup-note">
          No spam — just major announcements and rewards. You’ll be able to opt out anytime once emails begin.
        </p>

        <p class="footer">
          <a href="/privacy.html">Privacy</a>
          <span class="dot">•</span>
          <a id="contact-link" href="#" hidden>Contact</a>
        </p>
      </div>
    </section>
  </main>

  <noscript>
    <style>
      .bg{ animation:none !important; }
      .brand img{ animation:none !important; }
    </style>
  </noscript>

  <script src="script.js" defer></script>
</body>
</html>
