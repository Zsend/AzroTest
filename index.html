<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>Virtue Climbing — Stay Tuned</title>
    <meta name="description" content="Virtue Climbing — coming soon. Join the list for news. First subscribers get founding member rewards." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Container for the canvas -->
    <div id="canvas-container"></div>
    
    <!-- Logo and Heading -->
    <div class="logo-container">
      <img
        src="img/logo.png"
        alt="Virtue Climbing logo"
        id="logo"
      />
      <h1>stay tuned</h1>

      <p class="signup-text">Join the list for news. First subscribers get founding member rewards.</p>

      <!--
        ✅ Free + easiest email collection (no backend): FormSubmit
        1) Replace YOUR_RECEIVING_EMAIL@example.com below with the email you want signups sent to.
        2) Publish the site.
        3) Submit the form once yourself — FormSubmit will email you a confirmation link.

        Docs: https://formsubmit.co/
      -->
      <form
        class="subscribe-form"
        action="https://formsubmit.co/YOUR_RECEIVING_EMAIL@example.com"
        method="POST"
        autocomplete="on"
      >
        <!-- Send user back to your own thank-you page (instead of FormSubmit's default) -->
        <input type="hidden" name="_next" value="https://www.virtueclimbing.com/thanks.html" />
        <!-- Email subject line for the notification you receive -->
        <input type="hidden" name="_subject" value="Virtue Climbing — New subscriber" />
        <!-- Spam honeypot (FormSubmit will silently ignore submissions that fill this) -->
        <input
          class="honeypot"
          type="text"
          name="_honey"
          tabindex="-1"
          autocomplete="off"
          aria-hidden="true"
        />
        <!-- Optional: change the notification email template -->
        <input type="hidden" name="_template" value="table" />

        <label class="sr-only" for="email">Email address</label>
        <input
          id="email"
          name="email"
          type="email"
          inputmode="email"
          autocomplete="email"
          placeholder="Email address"
          required
        />
        <button type="submit">Join</button>
      </form>

      <p class="signup-fineprint">No spam. Unsubscribe anytime.</p>
    </div>
    
    <script src="script.js"></script>
  </body>
</html>
