<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Virtue Climbing — You’re In</title>
    <meta name="description" content="Thanks for subscribing to Virtue Climbing." />

    <div id="canvas-container"></div>

    <main class="logo-container">

        src="img/logo.png"
        alt="Virtue Climbing logo"
        id="logo"
        decoding="async"
      />
      <h1>you’re in</h1>

      <div class="thanks-actions">

    </main>

    <script src="script.js?v=final" defer></script>
