<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />

  <title>Virtue Climbing — You’re In</title>
  <meta name="description" content="Thanks for subscribing to Virtue Climbing." />
  <link rel="canonical" href="https://www.virtueclimbing.com/thanks.html" />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#05060a" />

  <link rel="preload" as="image" href="img/logo.webp" type="image/webp" />
  <link rel="preload" as="image" href="img/logo.png" type="image/png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"><canvas id="bg-canvas"></canvas></div>

  <main class="wrap">
    <section class="card" aria-label="Subscription confirmed">
      <picture class="brand">
        <source srcset="img/logo.webp" type="image/webp" />
        <img
          src="img/logo.png"
          width="340"
          height="158"
          alt="Virtue Climbing"
          decoding="async"
          fetchpriority="high"
        />
      </picture>

      <h1>You’re in</h1>
      <p class="sub">Thanks for subscribing. We’ll send updates and rewards as we get closer to launch.</p>

      <a class="btn" href="/">Back to site</a>

      <p class="footer">
        <a href="/privacy.html">Privacy</a>
      </p>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
