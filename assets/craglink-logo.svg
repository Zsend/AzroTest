<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 690 190" role="img" aria-labelledby="title desc">
  <title id="title">CragLink Power logo</title>
  <desc id="desc">CragLink Power wordmark with mountain signal beacon.</desc>
  <defs>
