<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc"><title id="title">Project BreakGlass benchmark workflow</title><desc id="desc">Workflow from public claim capture to hardware baseline, questions, lab quote, and PVS learning.</desc><rect width="1100" height="760" rx="48" fill="#F8F4EA"/><g font-family="Inter,Arial"><text x="72" y="92" font-size="46" font-weight="900" fill="#07111F" letter-spacing="-.05em">Project BreakGlass</text><text x="72" y="130" font-size="19" fill="#475467">A private benchmark system. Not a public accusation engine.</text></g><g transform="translate(72 214)" font-family="Inter,Arial" font-size="18"><g fill="#fff" stroke="#E2D8C7"><rect x="0" y="0" width="210" height="130" rx="26"/><rect x="250" y="0" width="210" height="130" rx="26"/><rect x="500" y="0" width="210" height="130" rx="26"/><rect x="750" y="0" width="210" height="130" rx="26"/><rect x="250" y="240" width="460" height="150" rx="30"/></g><g fill="#07111F" font-weight="900"><text x="26" y="56">Capture claims</text><text x="276" y="56">Acquire empty hardware</text><text x="526" y="56">Baseline record</text><text x="776" y="56">Export questions</text><text x="282" y="302">Route to PVS, counsel, lab quote, QuartzPath</text></g><g fill="#475467" font-size="15"><text x="26" y="88">Marketing language → test questions</text><text x="276" y="88">No prefilled or plant-touching</text><text x="526" y="88">Photos · custody · teardown map</text><text x="776" y="88">No conclusions yet</text><text x="282" y="336">Observations become questions before they become requirements.</text></g><g stroke="#2D5BFF" stroke-width="8" stroke-linecap="round"><path d="M212 65h38"/><path d="M462 65h38"/><path d="M712 65h38"/><path d="M855 132c-78 140-194 202-336 186"/><path d="M503 132c-56 98-62 162-17 192"/></g></g></svg>