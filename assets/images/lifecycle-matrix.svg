<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc"><title id="title">Lifecycle testing matrix</title><desc id="desc">A matrix visual showing new, stored, hot-car, partial-use, near-empty, and chain-pull conditions.</desc><rect width="1000" height="720" rx="44" fill="#F8F4EA"/><g font-family="Inter,Arial"><text x="64" y="80" font-size="44" font-weight="900" letter-spacing="-.05em" fill="#07111F">Lifecycle questions</text><text x="64" y="114" font-size="18" fill="#475467">Proof is defined by conditions, not slogans.</text></g><g transform="translate(64 170)" font-family="Inter,Arial"><g fill="#07111F" font-size="15" font-weight="800"><text x="0" y="0">Condition</text><text x="260" y="0">Material path</text><text x="460" y="0">Thermal</text><text x="640" y="0">Aerosol</text><text x="790" y="0">Record</text></g><g fill="#fff" stroke="#E2D8C7"><rect y="28" width="860" height="68" rx="18"/><rect y="110" width="860" height="68" rx="18"/><rect y="192" width="860" height="68" rx="18"/><rect y="274" width="860" height="68" rx="18"/><rect y="356" width="860" height="68" rx="18"/><rect y="438" width="860" height="68" rx="18"/></g><g font-size="17" fill="#07111F"><text x="0" y="70">New unit</text><text x="0" y="152">30–90 day storage</text><text x="0" y="234">Hot-car condition</text><text x="0" y="316">Partial use + restorage</text><text x="0" y="398">Near-empty</text><text x="0" y="480">Chain-pull sequence</text></g><g fill="#2D5BFF"><circle cx="310" cy="64" r="12"/><circle cx="510" cy="64" r="12"/><circle cx="690" cy="64" r="12"/><circle cx="825" cy="64" r="12"/><circle cx="310" cy="146" r="12"/><circle cx="690" cy="146" r="12"/><circle cx="825" cy="146" r="12"/><circle cx="310" cy="228" r="12"/><circle cx="510" cy="228" r="12"/><circle cx="690" cy="228" r="12"/><circle cx="825" cy="228" r="12"/><circle cx="510" cy="310" r="12"/><circle cx="690" cy="310" r="12"/><circle cx="825" cy="310" r="12"/><circle cx="510" cy="392" r="12"/><circle cx="690" cy="392" r="12"/><circle cx="825" cy="392" r="12"/><circle cx="510" cy="474" r="12"/><circle cx="690" cy="474" r="12"/><circle cx="825" cy="474" r="12"/></g></g></svg>