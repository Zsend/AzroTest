<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" role="img" aria-labelledby="title desc"><title id="title">Certificate of Vapor Analysis visual</title><desc id="desc">A dummy CVA record card showing fields and limitations.</desc><defs><filter id="s"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#07111F" flood-opacity=".16"/></filter></defs><rect width="980" height="720" rx="44" fill="#EEF4FF"/><g filter="url(#s)" transform="translate(110 72)"><rect width="760" height="576" rx="36" fill="#FFFFFF"/><rect width="760" height="94" rx="36" fill="#07111F"/><text x="42" y="58" font-family="Inter,Arial" font-size="30" font-weight="900" fill="#F8F4EA">CVA — Example Record</text><text x="560" y="58" font-family="Inter,Arial" font-size="16" font-weight="800" fill="#D7A64A">DUMMY</text><g font-family="Inter,Arial" fill="#07111F"><text x="42" y="146" font-size="20" font-weight="900">System</text><text x="42" y="176" font-size="16" fill="#475467">Device model · oil/formulation · test matrix version</text><text x="42" y="236" font-size="20" font-weight="900">Conditions</text><text x="42" y="266" font-size="16" fill="#475467">Storage · heat profile · use state · sample custody</text><text x="42" y="326" font-size="20" font-weight="900">Measured categories</text><rect x="42" y="348" width="160" height="34" rx="17" fill="#EAF2FF"/><text x="62" y="371" font-size="14" font-weight="800" fill="#1D4ED8">Metals</text><rect x="214" y="348" width="160" height="34" rx="17" fill="#EAF2FF"/><text x="234" y="371" font-size="14" font-weight="800" fill="#1D4ED8">VOCs</text><rect x="386" y="348" width="160" height="34" rx="17" fill="#EAF2FF"/><text x="406" y="371" font-size="14" font-weight="800" fill="#1D4ED8">Carbonyls</text><rect x="558" y="348" width="160" height="34" rx="17" fill="#EAF2FF"/><text x="578" y="371" font-size="14" font-weight="800" fill="#1D4ED8">E/L</text><text x="42" y="452" font-size="20" font-weight="900">Limitations</text><text x="42" y="482" font-si