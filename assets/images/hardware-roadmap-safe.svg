<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1040"><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fdfbf6"/><stop offset="1" stop-color="#eef4ff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#07111f" flood-opacity=".15"/></filter></defs><rect width="1800" height="1040" fill="url(#bg)"/><text x="90" y="120" fill="#07111f" font-size="72" font-family="Inter,Arial" font-weight="850" letter-spacing="-3">QuartzPath roadmap</text><text x="94" y="174" fill="#8a5a00" font-size="27" font-weight="800" font-family="Inter,Arial" letter-spacing="2">DESIGNED BACKWARD FROM THE STANDARD</text><g transform="translate(90 260)" filter="url(#s)"><rect width="360" height="520" rx="42" fill="#07111f"/><text x="44" y="70" fill="#fff" font-size="32" font-weight="850" font-family="Inter,Arial">1. Standard</text><text x="44" y="125" fill="#c7d4e7" font-size="22" font-family="Inter,Arial">Define what better hardware must prove before showing the product.</text><circle cx="180" cy="310" r="105" fill="none" stroke="#d7a64a" stroke-width="8"/><path d="M135 310h90M180 265v90" stroke="#d7a64a" stroke-width="8" stroke-linecap="round"/></g><g transform="translate(520 260)" filter="url(#s)"><rect width="360" height="520" rx="42" fill="#fff"/><text x="44" y="70" fill="#07111f" font-size="32" font-weight="850" font-family="Inter,Arial">2. Evidence</text><text x="44" y="125" fill="#475467" font-size="22" font-family="Inter,Arial">Benchmark unknowns, storage behavior, thermal behavior, and aerosol questions.</text><rect x="80" y="250" width="200" height="160" rx="26" fill="#eef4ff" stroke="#2d5bff" stroke-width="4"/><path d="M110 360 C160 260 215 420 250 305" fill="none" stroke="#2d5bff" stroke-width="8"/></g><g transform="translate(950 260)" filter="url(#s)"><rect width="360" height="520" rx="42" fill="#07111f"/><text x="44" y="70" fill="#fff" font-size="32" font-weight="850" font-family="Inter,Arial">3. IP gate</text><text x="44" y="125" fill="#c7d4e7" font-size="22" font-family="Inter,Arial">Capture mechanism internally, review with counsel, decide patent / trade secret / hold.</text><rect x="120" y="252" width="120" height="155" rx="18" fill="#d7a64a"/><rect x="148" y="220" width="64" height="70" rx="18" fill="#fff"/></g><g transform="translate(1380 260)" filter="url(#s)"><rect width="330" height="520" rx="42" fill="#fff"/><text x="44" y="70" fill="#07111f" font-size="32" font-weight="850" font-family="Inter,Arial">4. Prototype</text><text x="44" y="125" fill="#475467" font-size="22" font-family="Inter,Arial">Non-plant-touching learning first. Licensed-operator path only after gates.</text><circle cx="165" cy="325" r="108" fill="#07111f"/><path d="M105 325h120M165 265v120" stroke="#d7a64a" stroke-width="8" stroke-linecap="round"/></g><g stroke="#d7a64a" stroke-width="6" stroke-linecap="round"><path d="M460 520h50"/><path d="M890 520h50"/><path d="M1320 520h50"/></g><text x="92" y="900" fill="#475467" font-size="25" font-family="Inter,Arial">This roadmap does not disclose the QuartzPath mechanism. It shows the controlled sequence from standard to evidence, IP gate, and non-plant-touching learning.</text></svg>