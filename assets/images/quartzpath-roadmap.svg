<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc"><title id="title">QuartzPath roadmap visual</title><desc id="desc">Roadmap from PVS requirements to proof-native hardware without disclosing mechanism.</desc><rect width="1100" height="760" rx="48" fill="#F8F4EA"/><g font-family="Inter,Arial"><text x="72" y="94" font-size="46" font-weight="900" fill="#07111F" letter-spacing="-.05em">Hardware follows proof</text><text x="72" y="132" font-size="19" fill="#475467">QuartzPath is a roadmap, not a public mechanism disclosure.</text></g><g transform="translate(85 216)" font-family="Inter,Arial"><g><circle cx="65" cy="65" r="65" fill="#07111F"/><text x="65" y="59" text-anchor="middle" fill="#fff" font-size="18" font-weight="900">PVS</text><text x="65" y="84" text-anchor="middle" fill="#C7D4E7" font-size="13">requirements</text></g><g transform="translate(235 0)"><circle cx="65" cy="65" r="65" fill="#10213A"/><text x="65" y="59" text-anchor="middle" fill="#fff" font-size="18" font-weight="900">Data</text><text x="65" y="84" text-anchor="middle" fill="#C7D4E7" font-size="13">failure modes</text></g><g transform="translate(470 0)"><circle cx="65" cy="65" r="65" fill="#2D5BFF"/><text x="65" y="59" text-anchor="middle" fill="#fff" font-size="18" font-weight="900">IP</text><text x="65" y="84" text-anchor="middle" fill="#D6E4FF" font-size="13">protection</text></g><g transform="translate(705 0)"><circle cx="65" cy="65" r="65" fill="#D7A64A"/><text x="65" y="59" text-anchor="middle" fill="#07111F" font-size="18" font-weight="900">QP</text><text x="65" y="84" text-anchor="middle" fill="#27303B" font-size="13">prototype</text></g><path d="M130 65h105M365 65h105M600 65h105" stroke="#93A3B8" stroke-width="8" stroke-linecap="round"/></g><g transform="translate(85 430)" font-family="Inter,Arial"><rect width="930" height="190" rx="32" fill="#FFFFFF"/><text x="34" y="54" font-size="26" font-weight="900" fill="#07111F">Design constraints come from evidence</text><text x="34" y="92" font-size="17" fill="#475467">Known material path · stable storage contact · controlled thermal profile · aerosol-after-storage data · versioned records.</text><text x="34" y="144" font-size="16" font-weight="800" fill="#B45309">Not public:</text><text x="130" y="144" font-size="16" fill="#475467">mechanism details, geometry, material stack, temperature curves, supplier strategy, or patentable claims.</text></g></svg>