<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc"><title id="title">Proof Registry network visual</title><desc id="desc">Network of CVA records, status, versions, operators, and audit/pilot data.</desc><defs><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1000" height="720" rx="44" fill="#07111F"/><g opacity=".22" stroke="#C7D4E7"><path d="M170 188 L505 360 L820 190"/><path d="M170 188 L245 552 L505 360 L742 548 L820 190"/><path d="M245 552 L742 548"/></g><g fill="#F8F4EA" stroke="#D7A64A" stroke-width="4" filter="url(#glow)"><circle cx="170" cy="188" r="58"/><circle cx="505" cy="360" r="80"/><circle cx="820" cy="190" r="58"/><circle cx="245" cy="552" r="58"/><circle cx="742" cy="548" r="58"/></g><g font-family="Inter,Arial" text-anchor="middle" font-weight="900" fill="#07111F"><text x="170" y="194" font-size="18">CVA</text><text x="505" y="352" font-size="24">Registry</text><text x="505" y="382" font-size="14" fill="#475467">versioned records</text><text x="820" y="196" font-size="18">Status</text><text x="245" y="558" font-size="18">Pilot</text><text x="742" y="554" font-size="18">Limits</text></g><g font-family="Inter,Arial"><text x="68" y="84" fill="#F8F4EA" font-size="44" font-weight="900" letter-spacing="-.05em">Registry is memory</text><text x="68" y="120" fill="#C7D4E7" font-size="18">The future product is not a PDF. It is a machine-readable proof record.</text></g></svg>