<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1040"><defs><linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#12294b"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity=".25"/></filter></defs><rect width="1800" height="1040" fill="url(#bg)"/><text x="92" y="122" fill="#fff" font-size="72" font-weight="850" font-family="Inter,Arial" letter-spacing="-3">Proof Registry concept</text><text x="96" y="175" fill="#d7a64a" font-size="28" font-weight="750" font-family="Inter,Arial" letter-spacing="2">VERSIONED RECORDS · CONDITIONS · LIMITS · STATUS</text><g transform="translate(110 260)" filter="url(#s)"><rect width="600" height="520" rx="42" fill="#f8f4ea"/><text x="45" y="70" fill="#07111f" font-size="34" font-weight="850" font-family="Inter,Arial">CVA record</text><text x="45" y="115" fill="#475467" font-size="22" font-family="Inter,Arial">Defined system · defined test matrix · defined limitations</text><g transform="translate(45 170)" font-family="Inter,Arial"><text y="0" fill="#2d5bff" font-size="18" font-weight="850">RECORD ID</text><text y="33" fill="#07111f" font-size="28" font-weight="800">CVA-DRAFT-0001</text><text y="88" fill="#2d5bff" font-size="18" font-weight="850">STATUS</text><text y="121" fill="#07111f" font-size="28" font-weight="800">Internal example only</text><text y="176" fill="#2d5bff" font-size="18" font-weight="850">LIMITATIONS</text><text y="209" fill="#07111f" font-size="24" font-weight="700">No certification · no safety claim · no public mark</text></g><rect x="45" y="430" width="510" height="1" fill="#d7a64a"/><text x="45" y="470" fill="#475467" font-size="20" font-family="Inter,Arial">Public/private fields are separated by claim and counsel gates.</text></g><g transform="translate(830 260)" filter="url(#s)"><rect width="860" height="520" rx="42" fill="#0b1628" stroke="#304765"/><text x="45" y="70" fill="#fff" font-size="34" font-weight="850" font-family="Inter,Arial">Machine-readable registry memory</text><g transform="translate(45 130)" fill="none" stroke="#d7a64a" stroke-width="4"><circle cx="120" cy="160" r="88"/><circle cx="360" cy="160" r="88"/><circle cx="600" cy="160" r="88"/><path d="M208 160h64M448 160h64"/></g><g font-family="Inter,Arial" text-anchor="middle"><text x="165" y="305" fill="#fff" font-size="25" font-weight="800">Audit</text><text x="405" y="305" fill="#fff" font-size="25" font-weight="800">Pilot</text><text x="645" y="305" fill="#fff" font-size="25" font-weight="800">Record</text><text x="165" y="342" fill="#9fb4d6" font-size="18">knowns / unknowns</text><text x="405" y="342" fill="#9fb4d6" font-size="18">defined matrix</text><text x="645" y="342" fill="#9fb4d6" font-size="18">status + limits</text></g><rect x="45" y="405" width="770" height="72" rx="22" fill="rgba(255,255,255,.08)"/><text x="80" y="450" fill="#f8f4ea" font-size="22" font-family="Inter,Arial">Future use: searchable CVA IDs, version history, correction status, expiry, revocation, and public/private visibility.</text></g></svg>