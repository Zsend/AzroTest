<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc"><title id="title">One-page Proof Labs overview</title><desc id="desc">A simple visual map from Oil COA gap to Proof Vapor Standard, CVA, Registry, and QuartzPath.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#07111F"/><stop offset="1" stop-color="#0E2B51"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000" flood-opacity=".28"/></filter></defs><rect width="1200" height="860" rx="56" fill="url(#bg)"/><g font-family="Inter,Arial,sans-serif"><text x="76" y="102" fill="#F8F4EA" font-weight="900" font-size="56" letter-spacing="-.06em">Oil COA is not enough.</text><text x="76" y="144" fill="#C7D4E7" font-size="22">Proof Labs maps the vapor path: what the oil touched, what heat changed, and what came out.</text></g><g filter="url(#shadow)" font-family="Inter,Arial,sans-serif"><g transform="translate(76 222)"><rect width="250" height="180" rx="30" fill="#F8F4EA"/><text x="28" y="54" fill="#07111F" font-size="26" font-weight="900">COA</text><text x="28" y="87" fill="#475467" font-size="17">Oil/product batch</text><text x="28" y="127" fill="#07111F" font-size="16">Useful, but incomplete for full device/oil system proof.</text></g><g transform="translate(356 222)"><rect width="250" height="180" rx="30" fill="#F8F4EA"/><text x="28" y="54" fill="#07111F" font-size="26" font-weight="900">PVS</text><text x="28" y="87" fill="#475467" font-size="17">Proof Vapor Standard</text><text x="28" y="127" fill="#07111F" font-size="16">Defines what should be evaluated under real lifecycle conditions.</text></g><g transform="translate(636 222)"><rect width="250" height="180" rx="30" fill="#F8F4EA"/><text x="28" y="54" fill="#07111F" font-size="26" font-weight="900">CVA</text><text x="28" y="87" fill="#475467" font-size="17">Evidence record</text><text x="28" y="127" fill="#07111F" font-size="16">Records defined results, conditions, limits, and status.</text></g><g transform="translate(916 222)"><rect width="210" height="180" rx="30" fill="#D7A64A"/><text x="28" y="54" fill="#07111F" font-size="26" font-weight="900">Registry</text><text x="28" y="87" fill="#28303B" font-size="17">System memory</text><text x="28" y="127" fill="#07111F" font-size="16">Versioned records, corrections, expiries, and revocations.</text></g></g><g stroke="#D7A64A" stroke-width="8" stroke-linecap="round" fill="none"><path d="M326 312h30"/><path d="M606 312h30"/><path d="M886 312h30"/></g><g transform="translate(76 490)" font-family="Inter,Arial,sans-serif"><rect width="1050" height="260" rx="38" fill="#FFFFFF" opacity=".96"/><text x="36" y="58" fill="#07111F" font-size="32" font-weight="900" letter-spacing="-.04em">First commercial path</text><text x="36" y="103" fill="#475467" font-size="18">Private call → Proof Vapor Audit → one-SKU pilot → CVA-ready record only if data supports it.</text><g font-weight="800" font-size="18"><text x="36" y="162" fill="#07111F">1. Audit knowns / unknowns</text><text x="366" y="162" fill="#07111F">2. Scope pilot tests</text><text x="650" y="162" fill="#07111F">3. Build proof-native hardware</text><text x="36" y="212" fill="#475467" font-weight="400">Non-plant-touching first. No safety claims. No certification mark. No mechanism disclosure before IP review.</text></g></g></svg>