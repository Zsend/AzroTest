<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc"><title id="title">EVIDENCE lighthouse bridge</title><desc id="desc">A bridge diagram showing EVIDENCE story and Proof Labs proof converging into a lighthouse pilot.</desc><rect width="1000" height="720" rx="44" fill="#07111F"/><circle cx="820" cy="110" r="180" fill="#2D5BFF" opacity=".15"/><circle cx="160" cy="600" r="230" fill="#D7A64A" opacity=".16"/><g font-family="Inter,Arial"><text x="66" y="86" fill="#F8F4EA" font-size="44" font-weight="900" letter-spacing="-.05em">Story + proof</text><text x="66" y="122" fill="#C7D4E7" font-size="18">The first call earns the next step. The audit earns the pilot.</text></g><g transform="translate(78 204)" font-family="Inter,Arial"><rect width="330" height="250" rx="34" fill="#F8F4EA"/><text x="32" y="60" fill="#07111F" font-size="28" font-weight="900">EVIDENCE</text><text x="32" y="96" fill="#475467" font-size="17">Mission · culture · operator reality · vape lane</text><text x="32" y="168" fill="#07111F" font-size="19" font-weight="800">What they bring</text><text x="32" y="199" fill="#475467" font-size="16">A serious lighthouse context.</text></g><g transform="translate(592 204)" font-family="Inter,Arial"><rect width="330" height="250" rx="34" fill="#F8F4EA"/><text x="32" y="60" fill="#07111F" font-size="28" font-weight="900">Proof Labs</text><text x="32" y="96" fill="#475467" font-size="17">Standard · CVA · registry · data · hardware roadmap</text><text x="32" y="168" fill="#07111F" font-size="19" font-weight="800">What we bring</text><text x="32" y="199" fill="#475467" font-size="16">A measured proof system.</text></g><path d="M415 329H585" stroke="#D7A64A" stroke-width="10" stroke-linecap="round"/><circle cx="500" cy="329" r="46" fill="#2D5BFF"/><text x="500" y="337" text-anchor="middle" font-family="Inter,Arial" fill="#fff" font-size="18" font-weight="900">Pilot</text><g transform="translate(190 510)" font-family="Inter,Arial"><rect width="620" height="102" rx="30" fill="#FFFFFF" opacity=".95"/><text x="30" y="42" fill="#07111F" font-size="22" font-weight="900">Path: private call → audit → one-SKU pilot</text><text x="30" y="74" fill="#475467" font-size="16">No safety claims. No certification. No standard ownership. No mechanism disclosure.</text></g></svg>