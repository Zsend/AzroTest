<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Proof Labs full-stack architecture</title><desc id="desc">Layered diagram of Truth, Standard, CVA, Registry, QuartzPath, and licensed operators.</desc><defs><linearGradient id="a" x1="0" x2="1"><stop stop-color="#07111F"/><stop offset="1" stop-color="#13284A"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0B1324" flood-opacity=".20"/></filter></defs><rect width="1200" height="760" rx="54" fill="#F8F4EA"/><circle cx="980" cy="80" r="250" fill="#2D5BFF" opacity=".10"/><circle cx="190" cy="700" r="260" fill="#D7A64A" opacity=".13"/><g font-family="Inter,Arial,sans-serif"><text x="84" y="100" font-size="54" font-weight="900" letter-spacing="-.06em" fill="#07111F">The proof stack</text><text x="84" y="137" font-size="20" fill="#475467">Testing is the proof weapon. The company is the control layer.</text></g><g filter="url(#s)" font-family="Inter,Arial,sans-serif" font-weight="800"><g transform="translate(84 198)"><rect width="1010" height="76" rx="26" fill="#07111F"/><text x="32" y="48" fill="#fff" font-size="25">Truth — observe real lifecycle behavior</text></g><g transform="translate(144 296)"><rect width="890" height="76" rx="26" fill="#10213A"/><text x="32" y="48" fill="#fff" font-size="25">Standard — Proof Vapor Standard</text></g><g transform="translate(204 394)"><rect width="770" height="76" rx="26" fill="#244B88"/><text x="32" y="48" fill="#fff" font-size="25">Record — CVA + private data model</text></g><g transform="translate(264 492)"><rect width="650" height="76" rx="26" fill="#2D5BFF"/><text x="32" y="48" fill="#fff" font-size="25">Registry — status, version, limits</text></g><g transform="translate(324 590)"><rect width="530" height="76" rx="26" fill="#D7A64A"/><text x="32" y="48" fill="#07111F" font-size="25">Hardware — QuartzPath roadmap</text></g></g><g font-family="Inter,Arial" font-size="15" fill="#475467"><text x="900" y="624">Licensed operators touch cannabis.</text><text x="900" y="648">Proof Labs owns proof, data, IP,</text><text x="900" y="672">registry, mark governance.</text></g></svg>