<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CragLink Power mark">
  <defs>
    <linearGradient id="cyanMint" x1="20" y1="35" x2="172" y2="194" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1EEBE7"/>
      <stop offset="0.57" stop-color="#7CE7C4"/>
      <stop offset="1" stop-color="#B6E45C"/>
    </linearGradient>
    <linearGradient id="mastFade" x1="72" y1="17" x2="72" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#F7FFFD"/>
      <stop offset="1" stop-color="#1EEBE7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- top beacon: star + dots stay clean white; stem is one controlled white-to-cyan fade -->
  <g filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M72 22V104" stroke="url(#mastFade)" stroke-width="7"/>
