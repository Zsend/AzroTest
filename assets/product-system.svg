<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 680" role="img" aria-labelledby="title desc">
  <title id="title">CragLink Power basecamp system</title>
  <desc id="desc">A portable power box connected to a solar panel for remote basecamp internet.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#0F3E48" stop-opacity=".85"/><stop offset=".52" stop-color="#06131B"/><stop offset="1" stop-color="#020608"/></linearGradient>
    <radialGradient id="cyanGlow" cx=".58" cy=".22" r=".7"><stop stop-color="#19D9D0" stop-opacity=".35"/><stop offset=".42" stop-color="#19D9D0" stop-opacity=".08"/><stop offset="1" stop-color="#19D9D0" stop-opacity="0"/></radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#F4F7F5"/><stop offset=".42" stop-color="#BFCAD0"/><stop offset="1" stop-color="#6E7C83"/></linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#30393B"/><stop offset=".45" stop-color="#121A1D"/><stop offset="1" stop-color="#060A0C"/></linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#627271"/><stop offset="1" stop-color="#111516"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#19D9D0"/><stop offset="1" stop-color="#B7E65B"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#000" flood-opacity=".55"/></filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="980" height="680" rx="36" fill="url(#sky)"/>
  <rect width="980" height="680" rx="36" fill="url(#cyanGlow)"/>
  <g opacity=".25" fill="none" stroke="#6EEBDD" stroke-width="1">
    <path d="M-20 580 C170 450 290 516 430 360 S720 260 1020 450"/>
    <path d="M-20 608 C190 488 340 552 500 410 S780 330 1020 510"/>
    <path d="M-20 645 C220 522 360 604 535 470 S820 390 1020 570"/>
  </g>
  <g opacity=".32">
    <path d="M0 602 L90 512 L190 550 L320 410 L452 568 L615 376 L776 552 L876 438 L980 545 L980 680 L0 680Z" fill="#071014"/>
    <path d="M0 640 L160 562 L285 610 L460 508 L590 626 L725 532 L860 630 L980 585 L980 680 L0 680Z" fill="#030608"/>
  </g>

  <g filter="url(#shadow)">
    <!-- solar panel -->
    <g transform="translate(360 105) rotate(-9)">
      <path d="M0 58 L395 0 L480 65 L86 128 Z" fill="url(#panel)"/>
      <path d="M86 128 L480 65 L478 88 L86 152 Z" fill="#465157"/>
      <path d="M0 58 L86 128 L86 152 L0 82Z" fill="#99A8AE"/>
      <g opacity=".2" stroke="#031119" stroke-width="2">
        <path d="M80 48 L174 106"/><path d="M160 34 L254 92"/><path d="M240 22 L334 80"/><path d="M320 10 L414 68"/>
        <path d="M55 73 L448 15"/><path d="M90 100 L478 42"/>
      </g>
    </g>
    <path d="M610 205 C608 245 604 294 592 340" stroke="#A9B6B6" stroke-width="12" stroke-linecap="round"/>
    <path d="M612 205 C610 245 606 295 594 340" stroke="#253036" stroke-width="6" stroke-linecap="round"/>

    <!-- power box -->
    <g transform="translate(222 330)">
      <ellipse cx="282" cy="278" rx="330" ry="48" fill="#000" opacity=".45"/>
      <rect x="30" y="30" width="540" height="255" rx="28" fill="url(#box)" stroke="#4E5A5A" stroke-width="2"/>
      <rect x="47" y="47" width="506" height="220" rx="18" fill="#11191B" stroke="#2F3B3F"/>
      <path d="M60 52 H548" stroke="#64706E" opacity=".22"/>
      <rect x="430" y="74" width="82" height="86" rx="12" fill="#05090A" stroke="#425152"/>
      <rect x="445" y="90" width="52" height="18" rx="5" fill="url(#accent)" filter="url(#glow)"/>
      <rect x="447" y="124" width="22" height="8" rx="4" fill="#D7E4E0" opacity=".9"/>
      <rect x="477" y="124" width="18" height="8" rx="4" fill="#D7E4E0" opacity=".55"/>
      <circle cx="453" cy="176" r="13" fill="#0B1114" stroke="#879090"/><circle cx="493" cy="176" r="13" fill="#0B1114" stroke="#879090"/>
      <rect x="80" y="196" width="132" height="32" rx="16" fill="#070B0D" stroke="#3B4648"/>
      <circle cx="110" cy="212" r="10" fill="#0B1114" stroke="#8B9695"/><circle cx="145" cy="212" r="10" fill="#0B1114" stroke="#8B9695"/><circle cx="180" cy="212" r="10" fill="#0B1114" stroke="#8B9695"/>
      <g transform="translate(105 78) scale(.62)" opacity=".86">
        <path d="M25 148 L62 111 L80 134 L139 72 L139 141 L47 141" fill="none" stroke="#F7FBF7" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M52 142 H138" fill="none" stroke="#F7FBF7" stroke-width="7" stroke-linecap="round"/>
        <path d="M23 149 L146 175" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
        <path d="M57 93 C44 95 34 104 30 118 C24 135 26 154 28 168" fill="none" stroke="#19D9D0" stroke-width="7" stroke-linecap="round"/>
        <path d="M58 82 C36 85 20 100 14 121 C8 142 10 164 14 184" fill="none" stroke="#19D9D0" stroke-width="7" stroke-linecap="round"/>
      </g>
      <text x="215" y="110" fill="#F7FBF7" font-family="Arial, sans-serif" font-weight="700" font-size="24" letter-spacing="7">CRAGLINK</text>
      <text x="218" y="144" fill="#19D9D0" font-family="Arial, sans-serif" font-weight="700" font-size="14" letter-spacing="13">POWER</text>
    </g>
  </g>
</svg>
